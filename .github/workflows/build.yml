name: build-minimal-ffmpeg

# Builds minimal LGPL FFmpeg for all Ghost Downloader targets, smoke-tests each,
# and (on a tag) publishes version-less assets + .sha256 to a GitHub Release.
#
# Trigger by pushing a tag like n8.1.1-gd1. FFMPEG_REF pins the upstream source.

on:
  push:
    tags: ["n*-gd*"]
  workflow_dispatch:
    inputs:
      ffmpeg_ref:
        description: "FFmpeg git ref (release/8.1 branch or n8.1.1 tag)"
        default: "n8.1.1"

env:
  FFMPEG_REF: ${{ github.event.inputs.ffmpeg_ref || 'n8.1.1' }}

jobs:
  win-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [win64, winarm64, linux-x64, linux-arm64]
    container:
      # TODO: pin BtbN's cross toolchain base image (provides mingw-w64 + linux
      # cross toolchains). e.g. ghcr.io/btbn/ffmpeg-builds-... — confirm tag.
      image: ghcr.io/btbn/ffmpeg-builds-base:latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch FFmpeg source
        run: git clone --depth 1 -b "$FFMPEG_REF" https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
      - name: Build
        env: { TARGET: "${{ matrix.target }}" }
        run: bash scripts/build-windows-linux.sh ffmpeg-src out/${{ matrix.target }}
      - name: Smoke test
        # winarm64 cannot run on x64 host; CI runs under emulation or marks skipped loudly.
        run: |
          if [ "${{ matrix.target }}" = "winarm64" ]; then
            echo "::warning::winarm64 smoke test needs emulation; not run natively"
          else
            EXE_SUFFIX=$([ "${{ matrix.target }}" = "win64" ] && echo .exe || echo "") \
              bash scripts/smoke-test.sh out/${{ matrix.target }}
          fi
      - name: Package
        run: bash scripts/package.sh ${{ matrix.target }} out/${{ matrix.target }} dist
      - uses: actions/upload-artifact@v4
        with: { name: "ffmpeg-${{ matrix.target }}", path: dist/* }

  macos:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64, target: macos-x64 }
          - { arch: arm64,  target: macos-arm64 }
    steps:
      - uses: actions/checkout@v4
      - run: git clone --depth 1 -b "$FFMPEG_REF" https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
      - name: Build
        env: { ARCH: "${{ matrix.arch }}" }
        run: bash scripts/build-macos.sh ffmpeg-src out/${{ matrix.target }}
      - name: Smoke test
        # arm64 runs natively on macos-14; x86_64 runs under Rosetta on the same runner.
        run: bash scripts/smoke-test.sh out/${{ matrix.target }}
      - name: Package
        run: bash scripts/package.sh ${{ matrix.target }} out/${{ matrix.target }} dist
      - uses: actions/upload-artifact@v4
        with: { name: "ffmpeg-${{ matrix.target }}", path: dist/* }

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nttld/setup-ndk@v1
        id: ndk
        with: { ndk-version: r28 }
      - run: git clone --depth 1 -b "$FFMPEG_REF" https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
      - name: Build
        env: { ANDROID_NDK_ROOT: "${{ steps.ndk.outputs.ndk-path }}" }
        run: bash scripts/build-android.sh ffmpeg-src out/android-arm64
      - name: Smoke test (emulator)
        # TODO: run smoke-test.sh against an arm64 emulator (reactivecircus/android-emulator-runner)
        run: echo "::warning::android smoke test via emulator — TODO wire up"
      - name: Package
        run: bash scripts/package.sh android-arm64 out/android-arm64 dist
      - uses: actions/upload-artifact@v4
        with: { name: "ffmpeg-android-arm64", path: dist/* }

  release:
    needs: [win-linux, macos, android]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - uses: softprops/action-gh-release@v2
        with: { files: dist/* }
