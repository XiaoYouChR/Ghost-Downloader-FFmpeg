name: build-minimal-ffmpeg

# Builds minimal LGPL FFmpeg for every Ghost Downloader target and, on a tag,
# publishes version-less assets + .sha256 to a GitHub Release.
#
# Strategy (zero external libs -> identical, trivial cross-builds):
#   - linux/macOS build NATIVELY on per-arch runners (no cross) and run the FULL
#     smoke test. Those 4 runs (2 OS x 2 arch) validate the platform-independent
#     configure whitelist.
#   - Windows is cross-built from Linux (mingw-w64 / llvm-mingw); Android via NDK.
#     They are build-only: compiling is the per-toolchain proof; the feature set
#     is already proven by the native smoke runs. (winarm64/android can't run on
#     an x64 runner; win64 gets a best-effort Wine check.)
#
# Trigger by pushing a tag like n8.1.1-gd1. FFMPEG_REF pins the upstream source.

on:
  push:
    tags: ["n*-gd*"]
  workflow_dispatch:
    inputs:
      ffmpeg_ref:
        description: "FFmpeg git ref (e.g. n8.1.1)"
        default: "n8.1.1"

env:
  FFMPEG_REF: ${{ github.event.inputs.ffmpeg_ref || 'n8.1.1' }}
  LLVM_MINGW: llvm-mingw-20260616-ucrt-ubuntu-22.04-x86_64

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,   target: linux-x64 }
          - { runner: ubuntu-24.04-arm, target: linux-arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Fetch FFmpeg source
        run: git clone --depth 1 -b "$FFMPEG_REF" https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
      - name: Build
        run: bash scripts/build-linux.sh ffmpeg-src out
      - name: Smoke test
        run: bash scripts/smoke-test.sh out
      - name: Package
        run: bash scripts/package.sh ${{ matrix.target }} out dist
      - uses: actions/upload-artifact@v4
        with: { name: "ffmpeg-${{ matrix.target }}", path: dist/* }

  macos:
    # Both arches build on macos-14 (arm64); Intel runners (macos-13) are scarce
    # and queue for a long time. x86_64 is a clang -arch cross-build.
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: arm64,  target: macos-arm64 }
          - { arch: x86_64, target: macos-x64 }
    steps:
      - uses: actions/checkout@v4
      - name: Fetch FFmpeg source
        run: git clone --depth 1 -b "$FFMPEG_REF" https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
      - name: Build
        env: { ARCH: "${{ matrix.arch }}" }
        run: bash scripts/build-macos.sh ffmpeg-src out
      - name: Smoke test (arm64 native)
        if: matrix.arch == 'arm64'
        run: bash scripts/smoke-test.sh out
      - name: Smoke test (x86_64 via Rosetta, best-effort)
        if: matrix.arch == 'x86_64'
        continue-on-error: true
        run: |
          softwareupdate --install-rosetta --agree-to-license || true
          bash scripts/smoke-test.sh out \
            || { echo "::warning::macos-x64 Rosetta smoke did not pass (non-gating)"; exit 0; }
      - name: Package
        run: bash scripts/package.sh ${{ matrix.target }} out dist
      - uses: actions/upload-artifact@v4
        with: { name: "ffmpeg-${{ matrix.target }}", path: dist/* }

  windows:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [win64, winarm64]
    steps:
      - uses: actions/checkout@v4
      - name: Fetch FFmpeg source
        run: git clone --depth 1 -b "$FFMPEG_REF" https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
      - name: Toolchain (win64 = mingw-w64)
        if: matrix.target == 'win64'
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64
      - name: Toolchain (winarm64 = llvm-mingw)
        if: matrix.target == 'winarm64'
        run: |
          curl -fL -o llvm-mingw.tar.xz \
            "https://github.com/mstorsjo/llvm-mingw/releases/download/20260616/${LLVM_MINGW}.tar.xz"
          tar xf llvm-mingw.tar.xz
          echo "$PWD/${LLVM_MINGW}/bin" >> "$GITHUB_PATH"
      - name: Build
        env: { TARGET: "${{ matrix.target }}" }
        run: bash scripts/build-windows.sh ffmpeg-src out
      - name: Smoke test (win64 via Wine, best-effort)
        if: matrix.target == 'win64'
        continue-on-error: true
        run: |
          sudo apt-get install -y wine64 || sudo apt-get install -y wine
          RUNNER="wine64" EXE_SUFFIX=".exe" bash scripts/smoke-test.sh out \
            || { echo "::warning::win64 Wine smoke did not pass (non-gating)"; exit 0; }
      - name: Smoke note (winarm64)
        if: matrix.target == 'winarm64'
        run: echo "::warning::winarm64 cannot run on an x64 runner; feature set validated by native linux/macOS smoke."
      - name: Package
        run: bash scripts/package.sh ${{ matrix.target }} out dist
      - uses: actions/upload-artifact@v4
        with: { name: "ffmpeg-${{ matrix.target }}", path: dist/* }

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch FFmpeg source
        run: git clone --depth 1 -b "$FFMPEG_REF" https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
      - name: Build (preinstalled NDK)
        run: bash scripts/build-android.sh ffmpeg-src out  # reads $ANDROID_NDK_LATEST_HOME
      - name: Smoke note
        run: echo "::warning::android binary can't run on an x64 runner; feature set validated by native linux/macOS smoke."
      - name: Package
        run: bash scripts/package.sh android-arm64 out dist
      - uses: actions/upload-artifact@v4
        with: { name: "ffmpeg-android-arm64", path: dist/* }

  release:
    needs: [linux, macos, windows, android]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - uses: softprops/action-gh-release@v2
        with: { files: dist/* }
